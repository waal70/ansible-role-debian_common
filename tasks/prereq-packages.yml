---
- name: Stage packages that are pre-requisites
  ansible.builtin.set_fact:
    _common_install_packages:
      - python3-debian
      - python3-requests
      - sudo

# If we have a newly bootstrapped system, apt update was never run
# This becomes apparent by inspection of the apt cache folder

- name: Find /var/lib/apt/lists files ending with *Packages
  ansible.builtin.find:
    paths: /var/lib/apt/lists
    patterns: '*Packages'
  register: apt_result

- name: Ensure package manager is updated and ready on newly installed systems
  ansible.builtin.apt:
    update_cache: true
    upgrade: full
    autoclean: true
    autoremove: true
    purge: true
  timeout: 600 # on slow raspberries, updating may take a long time
  when:
    - not apt_result.failed
    - apt_result.examined != 0
    - apt_result.matched == 0

- name: Ensure package manager is updated and ready for regular systems
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400
    upgrade: full
    autoclean: true
    autoremove: true
    purge: true
  timeout: 600 # on slow raspberries, updating may take a long time

- name: Install pre-requisite packages
  ansible.builtin.apt:
    name: "{{ _common_install_packages }}"
    state: present

- name: Remove packages that are considered insecure
  ansible.builtin.apt:
    name: "{{ os_security_packages_list }}"
    state: absent
    purge: true

- name: Install modprobe to disable filesystems | os-10
  ansible.builtin.apt:
    name: kmod
    state: present

- name: Check if efi is installed
  ansible.builtin.stat:
    path: /sys/firmware/efi
  register: efi_installed

- name: Remove vfat from fs-list if efi is used
  ansible.builtin.set_fact:
    os_unused_filesystems: "{{ os_unused_filesystems | difference('vfat') }}"
  when:
    - efi_installed.stat.isdir is defined
    - efi_installed.stat.isdir

- name: Remove used filesystems from fs-list
  ansible.builtin.set_fact:
    os_unused_filesystems: "{{ os_unused_filesystems | difference(ansible_facts['mounts'] | map(attribute='fstype') | list) }}"

- name: Disable unused filesystems | os-10
  ansible.builtin.template:
    src: etc/modprobe.d/unused-fs.conf.j2
    dest: /etc/modprobe.d/unused-fs.conf
    owner: root
    group: root
    mode: "0644"
